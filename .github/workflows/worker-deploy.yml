name: Worker Deploy

on:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check Worker project
        id: worker
        run: |
          if [ -f worker/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ ! -f worker/package-lock.json ]; then
              echo "worker/package-lock.json not found; npm ci requires a lockfile."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "worker/package.json not found; skipping Worker deploy."
          fi

      - name: Check Cloudflare secrets
        if: steps.worker.outputs.exists == 'true'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare deployment secrets are missing."
            echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID before deploying."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set up Node
        if: steps.worker.outputs.exists == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        if: steps.worker.outputs.exists == 'true'
        working-directory: worker
        run: npm ci

      - name: Deploy to Cloudflare Workers
        if: steps.worker.outputs.exists == 'true'
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
