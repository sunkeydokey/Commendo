name: Worker CI

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"
  push:
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Test Worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check Worker project
        id: worker
        run: |
          if [ -f worker/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ ! -f worker/package-lock.json ]; then
              echo "worker/package-lock.json not found; npm ci requires a lockfile."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "worker/package.json not found; skipping Worker CI."
          fi

      - name: Set up Node
        if: steps.worker.outputs.exists == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        if: steps.worker.outputs.exists == 'true'
        working-directory: worker
        run: npm ci

      - name: Run tests
        if: steps.worker.outputs.exists == 'true'
        working-directory: worker
        run: npm test --if-present

      - name: Run lint
        if: steps.worker.outputs.exists == 'true'
        working-directory: worker
        run: npm run lint --if-present
